name: Deploy to sandbox data platform
on:
  push:
    branches:
      - "dev"

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: executing remote ssh git pull
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST_SANDBOX }}
          username: ${{ secrets.SSH_USER_SANDBOX }}
          key: ${{ secrets.SSH_KEY_SANDBOX }}
          port: ${{ secrets.SSH_PORT_SANDBOX }}
          script: |
            # Ensure repository exists and is exactly origin/dev
            if [ ! -d /srv/trackdechets-data ]; then
              echo "Repository does not exist, cloning dev branch"
              git clone --branch dev --single-branch https://${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} /srv/trackdechets-data
            elif [ ! -d /srv/trackdechets-data/.git ]; then
              echo "Repository is not a git repository, deleting and cloning again"
              rm -rf /srv/trackdechets-data
              git clone --branch dev --single-branch https://${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY} /srv/trackdechets-data
            else
              echo "Repository is a git repository, forcing update to origin/dev"
              cd /srv/trackdechets-data
              git fetch origin --prune
              git reset --hard origin/dev
              git clean -fd
            fi
            echo "Repository cloned/pulled successfully"
