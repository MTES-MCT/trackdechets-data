name: Validate sandbox and prod secrets
on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - environment: sandbox
            ssh_host_secret: SSH_HOST_SANDBOX
            ssh_user_secret: SSH_USER_SANDBOX
            ssh_key_secret: SSH_KEY_SANDBOX
            ssh_port_secret: SSH_PORT_SANDBOX
          - environment: prod
            ssh_host_secret: SSH_HOST
            ssh_user_secret: SSH_USER
            ssh_key_secret: SSH_KEY
            ssh_port_secret: SSH_PORT

    steps:
      - name: Validate SSH connection for ${{ matrix.environment }}
        shell: bash
        env:
          SSH_HOST: ${{ secrets[matrix.ssh_host_secret] }}
          SSH_USER: ${{ secrets[matrix.ssh_user_secret] }}
          SSH_KEY: ${{ secrets[matrix.ssh_key_secret] }}
          SSH_PORT: ${{ secrets[matrix.ssh_port_secret] }}
          ENVIRONMENT: ${{ matrix.environment }}
        run: |
          echo "Testing SSH connection for ${ENVIRONMENT}"
          printf '%s\n' "$SSH_KEY" > key
          chmod 600 key
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -i key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" 'echo OK'
          echo "SSH_OK for ${ENVIRONMENT}"
