name: Validate sandbox and prod secrets
on:
  workflow_dispatch:

jobs:
  validate-sandbox:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH connection for sandbox
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST_SANDBOX }}
          SSH_USER: ${{ secrets.SSH_USER_SANDBOX }}
          SSH_KEY: ${{ secrets.SSH_KEY_SANDBOX }}
          SSH_PORT: ${{ secrets.SSH_PORT_SANDBOX }}
        run: |
          echo "Testing SSH connection for sandbox"
          printf '%s\n' "$SSH_KEY" > key
          chmod 600 key
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -i key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" 'echo OK'
          echo "SSH_OK for sandbox"

  validate-prod:
    runs-on: ubuntu-latest
    steps:
      - name: Validate SSH connection for prod
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          echo "Testing SSH connection for prod"
          printf '%s\n' "$SSH_KEY" > key
          chmod 600 key
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -i key -p "${SSH_PORT:-22}" "${SSH_USER}@${SSH_HOST}" 'echo OK'
          echo "SSH_OK for prod"
